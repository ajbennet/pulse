<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PULSE" />
  <meta name="theme-color" content="#0e1117" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/browser@1.8.1/build/stlite.css" />
  <title>PULSE Lite</title>
  <style>html,body,#root{margin:0;height:100%;background:#0e1117}</style>
</head>
<body>
  <div id="root">Loading PULSE Lite… (first load downloads the Python runtime)</div>
  <script type="module">
    // stlite runs Streamlit fully in the browser (WebAssembly) — no server.
    // streamlit is bundled by stlite; only extra packages go in `requirements`.
    import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@1.8.1/build/stlite.js";

    const tickers = ["TQQQ", "AGG", "BRK-B", "UGL", "KMLM", "DBMF", "QQQM", "QQQ"];
    const paths = ["app_lite.py", ...tickers.map(t => `prices/${t}.csv`)];

    const files = {};
    await Promise.all(paths.map(async (p) => {
      files[p] = await (await fetch(p)).text();
    }));

    mount(
      { requirements: ["pandas", "numpy", "requests", "pyodide-http"],
        entrypoint: "app_lite.py", files },
      document.getElementById("root")
    );
  </script>
</body>
</html>
